<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OzCV — Paiement confirmé</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #C9A84C; --gold-light: #E8C97A;
      --dark: #0D0D0D; --dark2: #161616; --dark3: #1E1E1E;
      --border: rgba(201,168,76,0.2); --text: #F5F0E8; --muted: rgba(245,240,232,0.45);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; align-items: center; padding: 20px 32px; border-bottom: 1px solid var(--border); background: rgba(13,13,13,0.95); }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; background: linear-gradient(135deg, var(--gold), var(--gold-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 20px; }
    .card { background: var(--dark2); border: 1px solid var(--border); border-radius: 16px; padding: 44px 40px; max-width: 540px; width: 100%; text-align: center; }
    @media(max-width: 560px) { .card { padding: 28px 20px; } }
    .check { font-size: 60px; margin-bottom: 18px; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(26px, 5vw, 40px); letter-spacing: 2px; color: var(--text); margin-bottom: 14px; line-height: 1.1; }
    .subtitle { font-size: 14px; color: var(--muted); line-height: 1.8; margin-bottom: 24px; }
    .subtitle strong { color: var(--text); }
    .steps-box { background: var(--dark3); border: 1px solid var(--border); border-radius: 10px; padding: 20px 22px; margin-bottom: 24px; text-align: left; }
    .steps-box p { font-size: 13px; color: var(--muted); line-height: 2; }
    .steps-box strong { color: var(--gold); }
    .steps-box a { color: var(--gold); text-decoration: none; }
    .steps-box a:hover { text-decoration: underline; }
    .btn-primary { display: block; width: 100%; padding: 16px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 3px; cursor: pointer; border-radius: 8px; background: linear-gradient(135deg, var(--gold), var(--gold-light)); border: none; color: var(--dark); transition: all 0.2s; text-decoration: none; margin-bottom: 10px; }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .upgrade-nudge { background: rgba(201,168,76,0.05); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; font-size: 12px; color: var(--muted); margin-top: 16px; line-height: 1.7; }
    .upgrade-nudge a { color: var(--gold); text-decoration: none; font-weight: 600; }
    .upgrade-nudge a:hover { text-decoration: underline; }
    footer { text-align: center; padding: 24px 20px; border-top: 1px solid var(--border); color: var(--muted); font-size: 12px; display: flex; justify-content: center; gap: 20px; }
    footer a { color: var(--gold); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">OzCV</a>
</nav>

<div class="main">
  <div class="card" id="success-card">
    <div class="check">⏳</div>
    <h1>Chargement...</h1>
  </div>
</div>

<footer>
  <a href="/">Accueil</a>
  <a href="/privacy-policy.html">Privacy Policy</a>
  <span>© 2025 OzCV</span>
</footer>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var tier = params.get('tier') || 'standard';

  // Store tier in localStorage so the ATS toggle unlocks on return
  localStorage.setItem('ozcv_tier', tier);

  var card = document.getElementById('success-card');

  if (tier === 'standard') {
    card.innerHTML =
      '<div class="check">✅</div>' +
      '<h1>Paiement confirmé !</h1>' +
      '<p class="subtitle">Ton CV Standard est prêt à être généré.<br>' +
      'Retourne sur le générateur, remplis tes infos et télécharge ton PDF.</p>' +
      '<a class="btn-primary" href="/?paid=true&tier=standard">GÉNÉRER MON CV MAINTENANT</a>' +
      '<div class="upgrade-nudge">' +
      '💡 Envie d\'une version ATS 100% optimisée pour les mines ? ' +
      '<a href="/">Upgrade vers Pro pour $9 de plus →</a>' +
      '</div>';

  } else if (tier === 'pro') {
    card.innerHTML =
      '<div class="check">⭐</div>' +
      '<h1>Pack Pro activé !</h1>' +
      '<p class="subtitle">Tu peux maintenant générer ton CV Visuel <strong>ET</strong> ta version ATS<br>' +
      '100% optimisée pour PageUp, Workday et Seek AU.</p>' +
      '<div class="steps-box"><p>' +
      '🎯 <strong>Rappel — Tu as droit à 2 versions :</strong><br>' +
      '1. Génère ton CV en <strong>Mode Visuel</strong> (design premium)<br>' +
      '2. Active le <strong>Mode ATS</strong> et génère ta version optimisée<br>' +
      '&nbsp;&nbsp;&nbsp;&nbsp;pour passer les filtres automatiques des gros employeurs miniers' +
      '</p></div>' +
      '<a class="btn-primary" href="/?paid=true&tier=pro">RETOUR AU GÉNÉRATEUR</a>';

  } else if (tier === 'premium') {
    card.innerHTML =
      '<div class="check">🎉</div>' +
      '<h1>Merci pour ta commande Premium !</h1>' +
      '<p class="subtitle">Voici comment planifier ton appel avec Enzo :</p>' +
      '<div class="steps-box"><p>' +
      '1. Envoie <strong>\'PREMIUM\'</strong> + ton prénom sur WhatsApp :<br>' +
      '&nbsp;&nbsp;&nbsp;&nbsp;<a href="https://wa.me/61493496091">+61 493 496 091</a><br>' +
      '2. Ou par email : <a href="mailto:enzo.vanes@hotmail.com">enzo.vanes@hotmail.com</a><br><br>' +
      '<strong>Enzo répond sous 24h</strong> pour fixer le créneau.<br><br>' +
      '⏳ En attendant, génère ton CV sur la page principale —<br>' +
      'on le perfectionnera <strong>ensemble</strong> pendant l\'appel.' +
      '</p></div>' +
      '<a class="btn-primary" href="/?paid=true&tier=premium">GÉNÉRER MON CV MAINTENANT</a>';
  }
})();
</script>

</body>
</html>
